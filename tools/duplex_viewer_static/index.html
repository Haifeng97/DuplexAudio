<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duplex Timeline Inspector</title>
  <style>
    :root {
      --bg: #0f1218;
      --panel: #161b23;
      --panel-2: #1d2430;
      --line: #2b3443;
      --text: #edf2f7;
      --muted: #9aa7b8;
      --subtle: #687588;
      --idle: #6f7785;
      --wait: #2f80ed;
      --answer: #27ae60;
      --text-token: #b76cff;
      --eor: #eb5757;
      --gn: #f2c94c;
      --query: #56ccf2;
      --shadow: 0 18px 48px rgba(0, 0, 0, .26);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    button, select, input { font: inherit; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
    }
    header {
      grid-column: 1 / -1;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: #11161d;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, var(--wait), var(--text-token));
      box-shadow: 0 0 0 1px rgba(255,255,255,.08) inset;
    }
    .brand h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: .2px; }
    .brand span { color: var(--muted); font-size: 12px; }
    .top-meta { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; white-space: nowrap; }
    .sidebar {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: #121720;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }
    .side-block { padding: 14px; border-bottom: 1px solid var(--line); }
    .label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 7px; }
    select, input {
      width: 100%;
      border: 1px solid var(--line);
      background: #0f141b;
      color: var(--text);
      border-radius: 7px;
      padding: 9px 10px;
      outline: none;
    }
    input:focus, select:focus { border-color: #4c84d9; box-shadow: 0 0 0 3px rgba(47,128,237,.18); }
    input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--wait); }
    .manifest-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      min-width: 0;
    }
    .stat b { display: block; font-size: 16px; }
    .stat span { color: var(--muted); font-size: 11px; }
    .items {
      overflow: auto;
      padding: 8px;
    }
    .item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 9px;
      padding: 10px;
      cursor: pointer;
      display: grid;
      gap: 7px;
    }
    .item:hover { background: rgba(255,255,255,.035); }
    .item.active {
      background: rgba(47,128,237,.12);
      border-color: rgba(47,128,237,.45);
    }
    .item-row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .item-id { color: var(--muted); font: 11px ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 11px;
      white-space: nowrap;
    }
    .item-text { color: #d6dde7; font-size: 12px; line-height: 1.45; }
    main {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 180px),
        var(--bg);
      padding: 16px 18px 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(360px, .85fr);
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }
    .panel-head {
      position: relative;
      min-height: 42px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .panel-title { font-size: 13px; font-weight: 600; }
    .panel-body { padding: 12px; }
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .sample-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 600;
    }
    .sample-sub { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
    .metric { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .metric .v { font-size: 20px; font-weight: 600; }
    .metric .k { color: var(--muted); font-size: 11px; margin-top: 2px; }
    audio { width: 100%; margin-top: 12px; }
    .transport {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 7px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { border-color: #536276; background: #242d3b; }
    .time-readout { color: var(--muted); font: 12px ui-monospace, SFMono-Regular, Consolas, monospace; margin-left: auto; }
    canvas {
      background: #0d1219;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }
    .timeline-scroll {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1219;
      padding: 10px;
    }
    .timeline-track {
      min-width: 100%;
    }
    .axis-canvas {
      width: auto;
      height: 132px;
      max-width: none;
    }
    #timeAxis {
      height: 34px;
      cursor: default;
    }
    #wave { margin-top: 8px; }
    #mel {
      height: 220px;
      margin-top: 10px;
    }
    #mel.is-hidden { display: none; }
    .chunk-axis {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #0f141b;
    }
    .chunk-row {
      display: flex;
      min-height: 92px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .chunk-row:first-child { border-top: 0; }
    .chunk-cell {
      flex: 0 0 auto;
      width: var(--chunk-px);
      min-width: var(--chunk-px);
      max-width: var(--chunk-px);
      border: 0;
      border-right: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      padding: 8px 3px;
      font-size: 12px;
      line-height: 1.05;
      font-weight: 400;
      color: #f4f8ff;
      overflow: hidden;
      white-space: normal;
      text-align: center;
      text-overflow: clip;
      text-shadow: 0 1px 1px rgba(0,0,0,.35);
      cursor: pointer;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.055), inset 0 -14px 24px rgba(0,0,0,.16);
    }
    .chunk-cell:hover { filter: brightness(1.12); }
    .chunk-cell.token { font-family: inherit; }
    .chunk-label {
      position: absolute;
      left: 50%;
      top: 50%;
      display: block;
      max-height: calc(100% - 10px);
      max-width: calc(100% - 6px);
      overflow: hidden;
      writing-mode: vertical-rl;
      text-orientation: upright;
      transform: translate(-50%, -50%);
      transform-origin: center;
    }
    .chunk-cell.ascii .chunk-label {
      width: max-content;
      max-width: none;
      max-height: none;
      writing-mode: horizontal-tb;
      text-orientation: mixed;
      white-space: nowrap;
      transform: translate(-50%, -50%) rotate(-90deg);
    }
    .chunk-cell.idle { background: linear-gradient(180deg, rgba(132,141,154,.68), rgba(85,93,107,.58)); color: #eef3fa; }
    .chunk-cell.wait { background: linear-gradient(180deg, rgba(80,156,255,.86), rgba(39,114,216,.78)); }
    .chunk-cell.answer { background: linear-gradient(180deg, rgba(66,202,128,.84), rgba(35,158,88,.76)); }
    .chunk-cell.text { background: linear-gradient(180deg, rgba(198,132,255,.86), rgba(152,88,226,.78)); }
    .chunk-cell.eor { background: linear-gradient(180deg, rgba(255,119,119,.88), rgba(218,74,74,.8)); }
    .chunk-cell.active { box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px rgba(255,255,255,.35); }
    .timeline-wrap {
      margin-top: 10px;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1219;
      max-height: none;
      position: relative;
    }
    .timeline {
      position: relative;
      min-height: 210px;
      padding: 34px 10px 12px 76px;
    }
    .cursor {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #ffffff;
      box-shadow: 0 0 12px rgba(255,255,255,.75);
      pointer-events: none;
      z-index: 5;
    }
    .tick {
      position: absolute;
      top: 6px;
      color: var(--subtle);
      font: 10px ui-monospace, SFMono-Regular, Consolas, monospace;
      border-left: 1px solid rgba(255,255,255,.08);
      height: calc(100% - 12px);
      padding-left: 4px;
    }
    .lane { position: relative; height: 38px; margin-bottom: 9px; }
    .lane-name {
      position: absolute;
      left: -66px;
      top: 9px;
      color: var(--muted);
      width: 58px;
      text-align: right;
      font-size: 11px;
    }
    .seg {
      position: absolute;
      top: 4px;
      height: 28px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      padding: 0 6px;
      font-size: 11px;
      color: #fff;
      overflow: hidden;
      white-space: nowrap;
      cursor: pointer;
    }
    .seg.idle { background: rgba(111,119,133,.42); }
    .seg.wait { background: rgba(47,128,237,.68); }
    .seg.answer { background: rgba(39,174,96,.72); }
    .seg.text { background: rgba(183,108,255,.68); }
    .seg.eor { background: rgba(235,87,87,.72); }
    .seg.gn { outline: 1px solid rgba(242,201,76,.3); }
    .seg.active { box-shadow: 0 0 0 2px #fff inset; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 11px; }
    .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 5px; vertical-align: -1px; }
    .panel-head-actions { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .switch-row {
      position: absolute;
      left: 150px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .switch-row > span:last-child { width: 0; overflow: hidden; font-size: 0; }
    .switch-row::after { content: "\5361\7684\8bdd\53ef\4ee5\5173"; font-size: 12px; color: var(--muted); }
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      cursor: pointer;
    }
    .switch input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }
    .switch-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #344051;
      border: 1px solid rgba(255,255,255,.08);
      transition: background .16s ease, border-color .16s ease;
    }
    .switch-thumb {
      position: absolute;
      left: 3px;
      top: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f4f7fb;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
      transition: transform .16s ease;
    }
    .switch input:checked + .switch-track {
      background: var(--answer);
      border-color: rgba(255,255,255,.16);
    }
    .switch input:checked + .switch-track + .switch-thumb {
      transform: translateX(18px);
    }
    .switch input:focus + .switch-track {
      box-shadow: 0 0 0 3px rgba(47,128,237,.24);
    }
    .label-panel { min-height: 0; display: flex; flex-direction: column; }
    .label-panel .panel-body { flex: 1; min-height: 0; overflow: auto; }
    .split { display: grid; grid-template-columns: minmax(260px, 1fr) minmax(340px, 1fr); gap: 12px; min-width: 640px; }
    .split > * { min-width: 0; }
    .kv { display: grid; grid-template-columns: minmax(78px, 112px) minmax(0,1fr); gap: 7px 10px; font-size: 12px; line-height: 1.45; min-width: 0; }
    .kv .k { color: var(--muted); }
    .kv > div { min-width: 0; overflow-wrap: anywhere; }
    .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    .text-box {
      border: 1px solid var(--line);
      background: #0f141b;
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
    }
    .token-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-height: 170px;
      overflow: auto;
      padding: 8px;
      background: #0f141b;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .tok {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 5px;
      min-width: 25px;
      height: 25px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .tok.state { color: #dce8ff; }
    .tok.text { color: #f1ddff; border-color: rgba(183,108,255,.45); }
    .tok.active { outline: 2px solid #fff; }
    .table-wrap { overflow: auto; max-height: 360px; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 7px 8px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #101720; color: var(--muted); z-index: 2; }
    tr.active td { background: rgba(255,255,255,.08); }
    details { border-top: 1px solid var(--line); }
    details:first-child { border-top: 0; }
    summary { cursor: pointer; padding: 11px 12px; color: #dbe4ef; font-size: 13px; }
    pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      max-height: 420px;
      background: #0d1219;
      color: #d7e1ee;
      font-size: 11px;
      line-height: 1.45;
    }
    .empty { color: var(--muted); padding: 48px; text-align: center; }
    .notice {
      margin-top: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(242, 153, 74, .35);
      background: rgba(242, 153, 74, .10);
      color: #f3c69a;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.45;
    }
    @media (max-width: 1180px) {
      .app { grid-template-columns: 300px minmax(0, 1fr); }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { height: auto; display: block; }
      .sidebar { height: 420px; border-right: 0; border-bottom: 1px solid var(--line); }
      main { overflow: visible; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="mark"></div>
        <div>
          <h1>Duplex Timeline Inspector</h1>
          <span>音频 / timeline / token / sysprompt 检查台</span>
        </div>
      </div>
      <div class="top-meta" id="topMeta">Loading</div>
    </header>

    <aside class="sidebar">
      <div class="side-block">
        <label class="label" for="manifestSelect">Manifest</label>
        <select id="manifestSelect"></select>
        <div class="manifest-stats">
          <div class="stat"><b id="statCount">0</b><span>samples</span></div>
          <div class="stat"><b id="statAvg">0s</b><span>avg duration</span></div>
          <div class="stat"><b id="statScenarios">0</b><span>scenarios</span></div>
        </div>
      </div>
      <div class="side-block">
        <label class="label" for="searchInput">搜索 id / query / answer / scenario</label>
        <input id="searchInput" placeholder="例如 interrupt / 头盔 / wait">
      </div>
      <div class="items" id="items"></div>
    </aside>

    <main>
      <div id="content" class="empty">请选择一个样本</div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { manifests: [], manifestKey: 0, items: [], item: null, waveform: null, audioBuffer: null, mel: null, melEnabled: true, melComputing: false, melProgress: 0, activeIdx: -1, zoom: 32, loadSeq: 0, waveformError: '', audioAbort: null, autoFollow: true, programmaticScroll: false };
    const colors = { IDLE: '#6f7785', WAIT: '#2f80ed', ANSWER: '#27ae60', '<EOR>': '#eb5757' };

    function fmtSec(v) {
      const n = Number(v || 0);
      return n.toFixed(n >= 10 ? 1 : 2) + 's';
    }
    function esc(v) {
      return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function scenarioName(s) {
      return ({normal_qa:'正常QA', player_interrupts_ai:'玩家打断AI', incomplete_query:'不完整query'}[s] || s || '-');
    }
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    async function fetchWithRetry(path, opts = {}, retries = 2, timeoutMs = 15000) {
      let lastErr;
      for (let attempt = 0; attempt <= retries; attempt++) {
        const ctrl = new AbortController();
        const externalSignal = opts.signal;
        const abortFromExternal = () => ctrl.abort();
        const timer = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
          if (externalSignal?.aborted) throw new DOMException('Aborted', 'AbortError');
          externalSignal?.addEventListener('abort', abortFromExternal, { once: true });
          const res = await fetch(path, { ...opts, signal: ctrl.signal });
          clearTimeout(timer);
          if (!res.ok) {
            const body = await res.text().catch(() => '');
            throw new Error(body || `HTTP ${res.status}`);
          }
          return res;
        } catch (e) {
          clearTimeout(timer);
          lastErr = e;
          if (e?.name === 'AbortError') break;
          if (attempt >= retries) break;
          await sleep(350 * (attempt + 1));
        } finally {
          externalSignal?.removeEventListener('abort', abortFromExternal);
        }
      }
      throw lastErr;
    }
    async function api(path) {
      const res = await fetchWithRetry(path, {}, 2, 15000);
      return res.json();
    }
    async function init() {
      const data = await api('/api/manifests');
      state.manifests = data.manifests;
      $('topMeta').textContent = data.root;
      $('manifestSelect').innerHTML = state.manifests.map(m =>
        `<option value="${m.key}">${esc(m.path)} · ${m.count}</option>`).join('');
      $('manifestSelect').addEventListener('change', () => {
        state.manifestKey = Number($('manifestSelect').value);
        loadItems();
      });
      $('searchInput').addEventListener('input', debounce(loadItems, 180));
      await loadItems();
    }
    async function loadItems() {
      const m = state.manifests[state.manifestKey];
      $('statCount').textContent = m.count;
      $('statAvg').textContent = fmtSec(m.avg_duration_sec);
      $('statScenarios').textContent = Object.keys(m.scenario_counts || {}).length;
      const q = encodeURIComponent($('searchInput').value.trim());
      $('items').innerHTML = '<div class="empty" style="padding:18px">Loading samples...</div>';
      try {
        const data = await api(`/api/items?manifest=${state.manifestKey}&limit=500&q=${q}`);
        state.items = data.items;
        $('items').innerHTML = state.items.map(row => itemHtml(row)).join('');
        document.querySelectorAll('.item').forEach(btn => {
          btn.addEventListener('click', () => loadItem(Number(btn.dataset.index)));
        });
        if (state.items.length) await loadItem(state.items[0].index);
        else $('content').innerHTML = '<div class="empty">No matched samples</div>';
      } catch (e) {
        console.error(e);
        state.items = [];
        $('items').innerHTML = `<div class="empty" style="padding:18px">Load samples failed: ${esc(e.message || e)}</div>`;
        $('content').innerHTML = '<div class="empty">Manifest loaded, but sample list failed. Select another manifest or refresh.</div>';
      }
    }
    function itemHtml(row) {
      return `<button class="item" data-index="${row.index}">
        <div class="item-row">
          <span class="pill">${esc(scenarioName(row.scenario))}</span>
          <span class="pill">${fmtSec(row.duration_sec)} · ${row.timeline_chunks} chunks</span>
        </div>
        <div class="item-id">${esc(row.id)}</div>
        <div class="item-text">${esc(row.question_text)}</div>
      </button>`;
    }
    async function loadItem(index) {
      const seq = ++state.loadSeq;
      state.audioAbort?.abort();

        if (seq !== state.loadSeq || buffer !== state.audioBuffer) return null;
        const offset = t * hop;
        for (let i = 0; i < fftSize; i++) frame[i] = (data[offset + i] || 0) * hann(i, fftSize);
        const power = dftPower(frame, fftBins);
        for (let m = 0; m < melBins; m++) {
          const filter = filters[m];
          let energy = 0;
          for (let k = 0; k < fftBins; k++) energy += power[k] * filter[k];
          const db = 10 * Math.log10(energy + 1e-10);
          const idx = t * melBins + m;
          values[idx] = db;
          if (db < min) min = db;
          if (db > max) max = db;
        }
        if (t % batchFrames === 0 || t === frames - 1) {
          onProgress?.((t + 1) / frames);
          await nextFrame();
        }
      }
      return { values, frames, melBins, min, max, sampleRate };
    }
    function melColor(value) {
      value = Math.max(0, Math.min(1, value));
      const stops = [[13,18,25], [35,58,112], [47,128,237], [183,108,255], [242,201,76]];
      const scaled = value * (stops.length - 1);
      const i = Math.min(stops.length - 2, Math.floor(scaled));
      const t = scaled - i;
      const a = stops[i], b = stops[i + 1];
      return [
        Math.round(a[0] + (b[0] - a[0]) * t),
        Math.round(a[1] + (b[1] - a[1]) * t),
        Math.round(a[2] + (b[2] - a[2]) * t),
      ];
    }
    function drawMelStatus(message, progress = 0) {
      const c = $('mel');
      if (!c || !state.melEnabled) return;
      const ctx = c.getContext('2d'), w = c.clientWidth || c.width, h = c.clientHeight || c.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0d1219';
      ctx.fillRect(0, 0, w, h);
      const barW = Math.min(520, w - 64);
      const barH = 10;
      const x = 32;
      const y = Math.floor(h / 2) + 12;
      ctx.fillStyle = 'rgba(255,255,255,.07)';
      ctx.fillRect(x, y, barW, barH);
      ctx.fillStyle = '#2f80ed';
      ctx.fillRect(x, y, Math.max(2, barW * Math.max(0, Math.min(1, progress))), barH);
      ctx.fillStyle = '#edf2f7';
      ctx.font = '18px ui-monospace, Consolas, monospace';
      ctx.fillText(message, x, y - 18);
      ctx.fillStyle = '#9aa7b8';
      ctx.font = '13px ui-monospace, Consolas, monospace';
      ctx.fillText(`${Math.round(progress * 100)}%`, x + barW + 12, y + barH);
    }
    function ensureMelComputed(currentTime = 0) {
      if (!state.audioBuffer || state.mel || state.melComputing) return;
      const seq = state.loadSeq;
      state.melComputing = true;
      state.melProgress = 0;
      drawMelStatus('Computing Mel spectrogram...', 0);
      computeMelAsync(state.audioBuffer, seq, progress => {
        if (seq !== state.loadSeq) return;
        state.melProgress = progress;
        drawMelStatus('Computing Mel spectrogram...', progress);
      }).then(mel => {
        if (seq !== state.loadSeq) return;
        state.mel = mel;
        state.melComputing = false;
        state.melProgress = mel ? 1 : 0;
        drawMelSpectrogram(currentTime);
      }).catch(err => {
        console.warn(err);
        if (seq !== state.loadSeq) return;
        state.melComputing = false;
        drawMelStatus(`Mel failed: ${err.message || err}`, 0);
      });
    }
    function drawMelSpectrogram(currentTime = 0) {
      if (!state.melEnabled) return;
      const c = $('mel');
      if (!c) return;
      const ctx = c.getContext('2d'), w = c.clientWidth || c.width, h = c.clientHeight || c.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0d1219';
      ctx.fillRect(0, 0, w, h);
      if (!state.audioBuffer) {
        drawMelStatus('Mel spectrogram waiting for audio...', 0);
        return;
      }
      if (!state.mel) {
        ensureMelComputed(currentTime);
        drawMelStatus(state.melComputing ? 'Computing Mel spectrogram...' : 'Mel spectrogram queued...', state.melProgress || 0);
        return;
      }
      const mel = state.mel;
      if (!mel) return;
      const img = ctx.createImageData(w, h);
      const floor = Math.max(mel.min, mel.max - 72);
      const range = Math.max(1, mel.max - floor);
      for (let x = 0; x < w; x++) {
        const frameIdx = Math.min(mel.frames - 1, Math.floor(x / w * mel.frames));
        for (let y = 0; y < h; y++) {
          const melIdx = Math.min(mel.melBins - 1, Math.floor((1 - y / h) * mel.melBins));
          const db = mel.values[frameIdx * mel.melBins + melIdx];
          const [r, g, b] = melColor((db - floor) / range);
          const p = (y * w + x) * 4;
          img.data[p] = r;
          img.data[p + 1] = g;
          img.data[p + 2] = b;
          img.data[p + 3] = 255;
        }
      }
      ctx.putImageData(img, 0, 0);
      const duration = state.item?.stats?.duration_sec || state.audioBuffer.duration || 1;
      const tl = state.item?.timeline || [];
      tl.forEach(ent => {
        const x = ent.start_sec / duration * w;
        const ew = Math.max(1, (ent.end_sec - ent.start_sec) / duration * w);
        ctx.fillStyle = ent.label === 'WAIT' ? 'rgba(47,128,237,.055)' : ent.label === 'ANSWER' ? 'rgba(39,174,96,.07)' : ent.label_type === 'text' ? 'rgba(183,108,255,.055)' : 'rgba(255,255,255,.018)';
        ctx.fillRect(x, 0, ew, h);
      });
      ctx.strokeStyle = 'rgba(255,255,255,.22)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 1; i < 4; i++) {
        const y = i * h / 4;
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
      }
      ctx.stroke();
      ctx.fillStyle = 'rgba(237,242,247,.88)';
      ctx.font = '18px ui-monospace, Consolas, monospace';
      ctx.fillText('Mel spectrogram', 14, 24);
      ctx.fillStyle = 'rgba(237,242,247,.62)';
      ctx.font = '14px ui-monospace, Consolas, monospace';
      ctx.fillText('high', 14, 46);
      ctx.fillText('low', 14, h - 12);
      const cx = currentTime / duration * w;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, 0);
      ctx.lineTo(cx, h);
      ctx.stroke();
    }
    function updateActive(idx) {
      const tl = state.item?.timeline || [];
      idx = Math.max(0, Math.min(tl.length - 1, idx || 0));
      const prevIdx = state.activeIdx;
      state.activeIdx = idx;
      const ent = tl[idx] || {};
      $('timeReadout') && ($('timeReadout').textContent = `${fmtSec(ent.start_sec)} / ${fmtSec(state.item.stats.duration_sec)} · chunk ${idx}`);
      const cursor = $('cursor');
      if (cursor) cursor.style.left = `${76 + idx * state.zoom}px`;
      document.querySelectorAll('[data-idx]').forEach(el => el.classList.toggle('active', Number(el.dataset.idx) === idx));
      document.querySelectorAll('tr[data-idx]').forEach(el => el.classList.toggle('active', Number(el.dataset.idx) === idx));
      const detail = $('chunkDetail');
      if (detail) detail.innerHTML = Object.entries(ent).map(([k,v]) => `<div class="k">${esc(k)}</div><div class="mono">${esc(v)}</div>`).join('');
      if (idx !== prevIdx) autoScrollToActive(idx);
    }
    function updateCursor(timeSec) {
      const cursor = $('cursor');
      if (!cursor || !state.item) return;
      const chunkSec = state.item.chunk_ms / 1000;
      const maxX = (state.item.timeline || []).length * state.zoom;
      const x = Math.max(0, Math.min(maxX, Number(timeSec || 0) / chunkSec * state.zoom));
      cursor.style.left = `${76 + x}px`;
    }
    function seekTime(timeSec) {
      if (!state.item) return;
      const duration = state.item?.stats?.duration_sec || 0;
      const t = Math.max(0, Math.min(duration, Number(timeSec || 0)));
      const idx = Math.max(0, Math.min((state.item.timeline || []).length - 1, Math.floor(t / (state.item.chunk_ms / 1000))));
      const audio = $('audio');
      if (audio) audio.currentTime = t;
      updateActive(idx);
      updateCursor(t);
      drawWaveform(t);
      drawMelSpectrogram(t);
    }
    function canvasTimeFromEvent(canvas, ev) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
      const duration = state.item?.stats?.duration_sec || 0;
      return rect.width ? x / rect.width * duration : 0;
    }
    function bindSeekCanvas(canvas) {
      if (!canvas) return;
      let dragging = false;
      const seekFromEvent = (ev) => {
        ev.preventDefault();
        seekTime(canvasTimeFromEvent(canvas, ev));
      };
      canvas.addEventListener('pointerdown', ev => {
        dragging = true;
        canvas.setPointerCapture?.(ev.pointerId);
        seekFromEvent(ev);
      });
      canvas.addEventListener('pointermove', ev => {
        if (dragging) seekFromEvent(ev);
      });
      canvas.addEventListener('pointerup', ev => {
        if (dragging) seekFromEvent(ev);
        dragging = false;
        canvas.releasePointerCapture?.(ev.pointerId);
      });
      canvas.addEventListener('pointercancel', ev => {
        dragging = false;
        canvas.releasePointerCapture?.(ev.pointerId);
      });
    }
    function seekChunk(idx) {
      const ent = (state.item.timeline || [])[idx];
      if (!ent) return;
      seekTime(ent.start_sec);
    }
    function playChunk(idx) {
      const ent = (state.item.timeline || [])[idx];
      if (!ent) return;
      const audio = $('audio');
      audio.currentTime = ent.start_sec;
      audio.play();
      const stopAt = ent.end_sec;
      const timer = setInterval(() => {
        if (audio.currentTime >= stopAt || audio.paused) {
          audio.pause();
          clearInterval(timer);
        }
      }, 20);
    }
    function drawVerticalExportText(ctx, text, x, y, w, h) {
      if (!text || w < 12) return;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x + 1, y + 1, Math.max(1, w - 2), Math.max(1, h - 2));
      ctx.clip();
      ctx.fillStyle = '#f7fbff';
      ctx.font = '12px system-ui, -apple-system, Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (isAsciiText(text)) {
        ctx.translate(x + w / 2, y + h / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(text, 0, 0, Math.max(1, h - 12));
      } else {
        const chars = Array.from(text);
        const step = 13;
        const maxChars = Math.max(1, Math.floor((h - 10) / step));
        const visible = chars.slice(0, maxChars);
        const totalH = Math.max(0, (visible.length - 1) * step);
        const startY = y + h / 2 - totalH / 2;
        visible.forEach((ch, i) => {
          ctx.fillText(ch, x + w / 2, startY + i * step);
        });
      }
      ctx.restore();
    }
    function drawExportTokenRow(ctx, tl, width, y, rowH, px) {
      ctx.save();
      tl.forEach(ent => {
        const x = ent.idx * px;
        const cls = chunkClass(ent);
        const fill = cls === 'wait' ? 'rgba(47,128,237,.82)' : cls === 'answer' ? 'rgba(39,174,96,.82)' : cls === 'text' ? 'rgba(183,108,255,.82)' : cls === 'eor' ? 'rgba(235,87,87,.86)' : 'rgba(111,119,133,.58)';
        const w = Math.max(1, px - 1);
        const grad = ctx.createLinearGradient(x, y, x, y + rowH);
        grad.addColorStop(0, fill);
        grad.addColorStop(1, 'rgba(13,18,25,.28)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, rowH - 1);
        ctx.strokeStyle = 'rgba(255,255,255,.08)';
        ctx.strokeRect(x + .5, y + .5, Math.max(1, w - 1), rowH - 2);
        drawVerticalExportText(ctx, chunkText(ent), x, y, w, rowH - 1);
      });
      ctx.restore();
    }
    function exportTimelineImage() {
      if (!state.item) return;
      const tl = state.item.timeline || [];
      const px = state.zoom;
      const width = Math.max(tl.length * px, timelineWidth());
      const timeAxis = $('timeAxis'), wave = $('wave'), mel = $('mel');
      const timeH = 34, waveH = 132, melH = state.melEnabled ? 220 : 0, tokenH = 92, gap = 10;
      const height = timeH + 8 + waveH + gap + melH + (melH ? gap : 0) + tokenH;
      const out = document.createElement('canvas');
      out.width = width;
      out.height = height;
      const ctx = out.getContext('2d');
      ctx.fillStyle = '#0d1219';
      ctx.fillRect(0, 0, width, height);
      if (timeAxis) ctx.drawImage(timeAxis, 0, 0, width, timeH);
      let y = timeH + 8;
      ctx.drawImage(wave, 0, y, width, waveH);
      y += waveH + gap;
      if (melH) {
        ctx.drawImage(mel, 0, y, width, melH);
        y += melH + gap;
      }
      drawExportTokenRow(ctx, tl, width, y, tokenH, px);
      const a = document.createElement('a');
      const id = String(state.item.id || 'sample').replace(/[^a-zA-Z0-9_.-]+/g, '_').slice(0, 80);
      a.download = `duplex_timeline_${id}.png`;
      a.href = out.toDataURL('image/png');
      a.click();
    }
    function debounce(fn, ms) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }
    init().catch(err => {
      console.error(err);
      $('content').innerHTML = `<div class="empty">${esc(err.message)}</div>`;
    });
  </script>
</body>
</html>
